<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Loja Virtual</title>
    
    <script src="Js/script.js"></script>

    <script>
        function mensagemBoasVindas() {
            document.getElementById("boas-vindas").innerText = "Bem-vindo à TechStore! Aproveite nossas ofertas.";
        }
    </script>

    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #1a1a1a; color: #e0e0e0; }
        h1 { color: #ffffff; }
        .produto { border: 1px solid #404040; padding: 15px; margin-bottom: 10px; border-radius: 5px; background: #2a2a2a; max-width: 300px; color: #e0e0e0; }
        .produto h3 { color: #ffffff; }
        .produto p { color: #b0b0b0; }
        button { background-color: #28a745; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 3px; }
        button:hover { background-color: #20c997; }
        #resultado { margin-top: 20px; padding: 15px; background-color: #2a2a2a; border-radius: 5px; font-weight: bold; white-space: pre-wrap; color: #e0e0e0; border: 1px solid #404040; }
    </style>
</head>
<body onload="mensagemBoasVindas()">

    <h1>TechStore</h1>
    <p id="boas-vindas" style="color: blue; font-weight: bold;"></p>

    <div class="produto">
        <h3>Smartphone Galaxy S23</h3>
        <p>Preço: R$ 3500,00</p>
        <button onclick="processarCompra('Smartphone Galaxy S23', 3500)">Comprar Smartphone</button>
    </div>

    <div class="produto">
        <h3>Fone de Ouvido Bluetooth</h3>
        <p>Preço: R$ 250,00</p>
        <button onclick="processarCompra('Fone de Ouvido Bluetooth', 250)">Comprar Fone</button>
    </div>

    <div id="resultado"></div>

</body>
</html>
